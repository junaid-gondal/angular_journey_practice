<h1>  conditional statments</h1>
<div>

   @for(user of users(); track user)
   {
    <li><span>{{user}}</span></li>
   }
</div>
<div>
   @for(user of userdetail(); track user.id)
   {
     <li> <span> {{user.name}}  </span>
        @if($first)
      {<span> admin</span>}
       @if($last)
      {<span> guest</span>}

     </li>
       @if($count==$index+1)  
       {

       <span> total users : {{$count}}</span>
       }

   }


</div>
